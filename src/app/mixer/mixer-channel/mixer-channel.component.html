    <div class="mixer-channel" [class.mixer-channel--selected]="channel().select">
      <div class="mixer-channel__label">{{ channel().name }}</div>

      <!-- Pan Knob -->
      <div class="mixer-channel__pan">
        <app-rotary-knob
          [value]="channel().pan"
          [min]="-100"
          [max]="100"
          [step]="1"
          size="small"
          (valueChange)="onPanChange($event)"
        ></app-rotary-knob>
        <span class="mixer-channel__pan-label">{{ formatPan(channel().pan) }}</span>
      </div>

      <!-- ON Button -->
      <button class="mixer-channel__button mixer-channel__button--on" [class.mixer-channel__button--active]="channel().on"
              (click)="onOnToggle()">ON</button>

      <!-- VU Meter (horizontal) -->
      <div class="mixer-channel__meter">
        @for (seg of getVUSegments(); track $index) {
          <div class="mixer-channel__meter-segment"
               [class.mixer-channel__meter-segment--active]="seg"
               [class.mixer-channel__meter-segment--yellow]="$index >= 8 && $index < 10"
               [class.mixer-channel__meter-segment--red]="$index >= 10"></div>
        }
        <div class="mixer-channel__clip-led" [class.mixer-channel__clip-led--active]="channel().clip">C</div>
      </div>

      <!-- Solo & Cue on one line -->
      <div class="mixer-channel__button-row">
        <button class="mixer-channel__button mixer-channel__button--solo" [class.mixer-channel__button--active]="channel().solo"
                (click)="onSoloToggle()">SOLO</button>
        <button class="mixer-channel__button mixer-channel__button--cue" [class.mixer-channel__button--active]="channel().cue"
                (click)="onCueToggle()">CUE</button>
      </div>

      <!-- Select Button -->
      <button class="mixer-channel__button mixer-channel__button--select" [class.mixer-channel__button--active]="channel().select"
              (click)="onSelect()">SEL</button>

      <!-- Fader -->
      <app-fader 
        [value]="channel().faderValue"
        (valueChange)="onFaderChange($event)"
      ></app-fader>
    </div>
