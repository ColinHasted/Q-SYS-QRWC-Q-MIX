<div class="control-pane control-pane--eq">
  <div class="control-pane__header">EQUALISER</div>

  <div class="equalizer">
    <!-- Top section with band selectors and display -->
    <div class="equalizer__top-section">
      <!-- Band selector buttons (1-7) vertical -->
      <div class="equalizer__band-selectors">
        <div class="equalizer__band-label">BAND</div>
        @for (band of eqBands(); track $index) {
          <button 
            class="equalizer__band-btn"
            [class.equalizer__band-btn--active]="selectedBand() === $index"
            [attr.data-band]="$index"
            (click)="selectBand($index)">
            {{ $index + 1 }}
          </button>
        }
      </div>

      <!-- EQ Response Display -->
      <div class="equalizer__display-wrapper">
        <app-mixer-equalizer-response />
      </div>
    </div>

    <!-- Single control set for selected band -->
    <div class="equalizer__controls">
      <div class="equalizer__knobs">
        <app-gauge-knob
          [value]="currentBand.Gain()"
          [min]="-18"
          [max]="18"
          [step]="0.5"
          size="normal"
          label="GAIN"
          unit="dB"
          (valueChange)="onGainChange(selectedBand(), $event)" />
        
        <app-gauge-knob
          [value]="currentBand.Frequency()"
          [min]="currentBandRange.min"
          [max]="currentBandRange.max"
          [step]="currentBandRange.step"
          size="normal"
          label="FREQ"
          unit="Hz"
          [showSign]="false"
          (valueChange)="onFrequencyChange(selectedBand(), $event)" />
        
        <app-gauge-knob
          [value]="currentBand.Q()"
          [min]="0.1"
          [max]="10"
          [step]="0.1"
          size="normal"
          label="Q"
          unit=""
          [showSign]="false"
          (valueChange)="onQChange(selectedBand(), $event)" />
      </div>
    </div>
  </div>

  <div class="control-pane__footer">
    <button class="panel-toggle" [class.active]="!bypass()"
            (click)="onToggle()">EQ</button>
  </div>
</div>
