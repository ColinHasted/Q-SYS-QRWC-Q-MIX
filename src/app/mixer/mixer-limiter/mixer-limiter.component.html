<div class="control-pane control-pane--limiter">
  <div class="control-pane__header">LIMITER</div>
  <div class="control-pane__content">
    <div class="knob-row">
      <app-gauge-knob
        [value]="attack()"
        [min]="0.1"
        [max]="10"
        [step]="0.1"
        label="ATTACK"
        unit="ms"
        [showSign]="false"
        (valueChange)="onAttackChange($event)"
      />
      <app-gauge-knob
        [value]="release()"
        [min]="10"
        [max]="500"
        [step]="1"
        label="RELEASE"
        unit="ms"
        [showSign]="false"
        (valueChange)="onReleaseChange($event)"
      />
    </div>
    <div class="knob-row">
      <app-gauge-knob
        [value]="threshold()"
        [min]="-20"
        [max]="0"
        [step]="0.5"
        label="THRESH"
        unit="dB"
        [showSign]="true"
        (valueChange)="onThresholdChange($event)"
      />
    </div>
    <div class="curve-display">
      <canvas #curveCanvas></canvas>
    </div>
  </div>
  <div class="control-pane__footer">
    <button class="panel-toggle" [class.active]="on()"
            (click)="onToggle()">LIMIT</button>
  </div>
</div>
