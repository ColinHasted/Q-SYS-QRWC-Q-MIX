<div class="control-pane control-pane--hpf" [class.is-disabled]="disabled()">
  <div class="control-pane__header">HPF</div>
  <div class="control-pane__content">
    <app-gauge-knob
      [position]="frequencyPosition()"
      [displayValue]="frequencyString()"
      size="normal"
      label="FREQ"
      (positionChange)="onFrequencyPositionChange($event)"
    />
  </div>
  <div class="control-pane__footer">
    <button class="panel-toggle" [class.active]="on()" (click)="onToggle()">ON</button>
  </div>
</div>
