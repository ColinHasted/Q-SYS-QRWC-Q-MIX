<div class="control-pane control-pane--cue">
  <div class="control-pane__header">CUE</div>
  <div class="control-pane__content">
    <div class="cue-main">
      <!-- Stereo VU Meters -->
      <div class="cue-vu-stereo">
        <div class="cue-vu">
          @for (seg of getVUSegments(vuLevelL()); track $index) {
            <div class="cue-vu__segment"
                 [class.cue-vu__segment--active]="seg"
                 [class.cue-vu__segment--yellow]="$index >= 8 && $index < 10"
                 [class.cue-vu__segment--red]="$index >= 10"></div>
          }
          <div class="cue-vu__clip" [class.cue-vu__clip--active]="clipL()">L</div>
        </div>
        <div class="cue-vu">
          @for (seg of getVUSegments(vuLevelR()); track $index) {
            <div class="cue-vu__segment"
                 [class.cue-vu__segment--active]="seg"
                 [class.cue-vu__segment--yellow]="$index >= 8 && $index < 10"
                 [class.cue-vu__segment--red]="$index >= 10"></div>
          }
          <div class="cue-vu__clip" [class.cue-vu__clip--active]="clipR()">R</div>
        </div>
      </div>

      <!-- Gain Knob -->
      <div class="cue-controls">
        <div class="knob-group">
          <label>GAIN</label>
          <app-rotary-knob
            [value]="gain()"
            [min]="-20"
            [max]="10"
            [step]="0.5"
            (valueChange)="onGainChange($event)"
          />
          <div class="value-display">{{ formatGain(gain()) }}dB</div>
        </div>
      </div>
    </div>
  </div>
  <div class="control-pane__footer">
    <button class="panel-toggle" [class.active]="on()"
            (click)="onToggle()">CUE</button>
  </div>
</div>
