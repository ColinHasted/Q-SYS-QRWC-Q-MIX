<div class="strip-panel comp-panel">
  <div class="panel-header">COMP</div>
  <div class="panel-content">
    <div class="knob-row">
      <div class="knob-group">
        <div class="knob-wrapper">
          <app-rotary-knob
            [value]="attack()"
            [min]="0.1"
            [max]="100"
            [step]="0.1"
            (valueChange)="onAttackChange($event)"
          />
        </div>
        <label>ATTACK</label>
      </div>
      <div class="knob-group">
        <div class="knob-wrapper">
          <app-rotary-knob
            [value]="release()"
            [min]="10"
            [max]="1000"
            [step]="1"
            (valueChange)="onReleaseChange($event)"
          />
        </div>
        <label>RELEASE</label>
      </div>
    </div>
    <div class="knob-row">
      <div class="knob-group">
        <div class="knob-wrapper">
          <app-rotary-knob
            [value]="ratio()"
            [min]="1"
            [max]="20"
            [step]="0.5"
            (valueChange)="onRatioChange($event)"
          />
        </div>
        <label>RATIO</label>
      </div>
      <div class="knob-group">
        <div class="knob-wrapper">
          <app-rotary-knob
            [value]="makeup()"
            [min]="0"
            [max]="24"
            [step]="0.5"
            (valueChange)="onMakeupChange($event)"
          />
        </div>
        <label>GAIN</label>
      </div>
    </div>
    <div class="knob-row">
      <div class="knob-group threshold-knob">
        <div class="knob-wrapper large">
          <app-rotary-knob
            [value]="threshold()"
            [min]="-60"
            [max]="0"
            [step]="1"
            size="large"
            (valueChange)="onThresholdChange($event)"
          />
        </div>
        <label>THRESHOLD</label>
      </div>
    </div>
    <button class="panel-toggle" [class.active]="on()"
            (click)="onToggle()">COMP</button>
  </div>
</div>
