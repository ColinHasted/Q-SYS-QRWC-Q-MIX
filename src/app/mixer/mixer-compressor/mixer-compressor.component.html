<div class="control-pane control-pane--comp">
  <div class="control-pane__header">COMP</div>
  <div class="control-pane__content">
    <div class="knob-row">
      <app-gauge-knob
        [value]="attack()"
        [min]="0.1"
        [max]="100"
        [step]="0.1"
        size="small"
        label="ATTACK"
        unit="ms"
        [showSign]="false"
        (valueChange)="onAttackChange($event)"
      />
      <app-gauge-knob
        [value]="release()"
        [min]="10"
        [max]="1000"
        [step]="1"
        size="small"
        label="RELEASE"
        unit="ms"
        [showSign]="false"
        (valueChange)="onReleaseChange($event)"
      />
      <app-gauge-knob
        [value]="depth()"
        [min]="0"
        [max]="100"
        [step]="1"
        size="small"
        label="DEPTH"
        unit="%"
        [showSign]="false"
        (valueChange)="onDepthChange($event)"
      />
    </div>
    <div class="knob-row">
      <app-gauge-knob
        [value]="threshold()"
        [min]="-60"
        [max]="0"
        [step]="1"
        label="THRESHOLD"
        unit="dB"
        [showSign]="true"
        (valueChange)="onThresholdChange($event)"
      />
      <app-gauge-knob
        [value]="ratio()"
        [min]="1"
        [max]="20"
        [step]="0.5"
        label="RATIO"
        unit=":1"
        [showSign]="false"
        (valueChange)="onRatioChange($event)"
      />
      <app-gauge-knob
        [value]="knee()"
        [min]="0"
        [max]="20"
        [step]="0.5"
        label="KNEE"
        unit="dB"
        [showSign]="false"
        (valueChange)="onKneeChange($event)"
      />
      <app-gauge-knob
        [value]="makeup()"
        [min]="0"
        [max]="24"
        [step]="0.5"
        label="GAIN"
        unit="dB"
        [showSign]="true"
        (valueChange)="onMakeupChange($event)"
      />
    </div>
    <div class="curve-display">
      <canvas #curveCanvas></canvas>
    </div>
  </div>
  <div class="control-pane__footer">
    <button class="panel-toggle" [class.active]="!bypass()"
            (click)="onToggle()">COMP</button>
  </div>
</div>
