<div class="control-pane control-pane--gate">
  <div class="control-pane__header">GATE</div>
  <div class="control-pane__content">
    <div class="knob-row">
      <app-gauge-knob
        [value]="attack()"
        [min]="0.1"
        [max]="10"
        [step]="0.1"
        size="small"
        label="ATTACK"
        unit="ms"
        [showSign]="false"
        (valueChange)="onAttackChange($event)"
      />
      <app-gauge-knob
        [value]="hold()"
        [min]="0"
        [max]="2000"
        [step]="1"
        size="small"
        label="HOLD"
        unit="ms"
        [showSign]="false"
        (valueChange)="onHoldChange($event)"
      />
      <app-gauge-knob
        [value]="release()"
        [min]="10"
        [max]="1000"
        [step]="1"
        size="small"
        label="RELEASE"
        unit="ms"
        [showSign]="false"
        (valueChange)="onReleaseChange($event)"
      />
    </div>
    <div class="knob-row">
      <app-gauge-knob
        [value]="threshold()"
        [min]="-80"
        [max]="0"
        [step]="1"
        label="THRESHOLD"
        unit="dB"
        [showSign]="true"
        (valueChange)="onThresholdChange($event)"
      />
      <app-gauge-knob
        [value]="range()"
        [min]="-80"
        [max]="0"
        [step]="1"
        label="DEPTH"
        unit="dB"
        [showSign]="true"
        (valueChange)="onRangeChange($event)"
      />
    </div>
    <div class="curve-display">
      <canvas #curveCanvas></canvas>
    </div>
  </div>
  <div class="control-pane__footer">
    <button class="panel-toggle" [class.active]="on()"
            (click)="onToggle()">GATE</button>
  </div>
</div>
