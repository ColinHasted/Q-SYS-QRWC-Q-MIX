<div class="strip-panel gate-panel">
  <div class="panel-header">GATE</div>
  <div class="panel-content">
    <div class="knob-row">
      <div class="knob-group">
        <div class="knob-wrapper">
          <app-rotary-knob
            [value]="attack()"
            [min]="0.1"
            [max]="10"
            [step]="0.1"
            (valueChange)="onAttackChange($event)"
          />
        </div>
        <label>ATTACK</label>
      </div>
      <div class="knob-group">
        <div class="knob-wrapper">
          <app-rotary-knob
            [value]="release()"
            [min]="10"
            [max]="1000"
            [step]="1"
            (valueChange)="onReleaseChange($event)"
          />
        </div>
        <label>RELEASE</label>
      </div>
      <div class="knob-group">
        <div class="knob-wrapper">
          <app-rotary-knob
            [value]="range()"
            [min]="-80"
            [max]="0"
            [step]="1"
            (valueChange)="onRangeChange($event)"
          />
        </div>
        <label>DEPTH</label>
      </div>
    </div>
    <div class="knob-row">
      <div class="knob-group threshold-knob">
        <div class="knob-wrapper large">
          <app-rotary-knob
            [value]="threshold()"
            [min]="-80"
            [max]="0"
            [step]="1"
            size="large"
            (valueChange)="onThresholdChange($event)"
          />
        </div>
        <label>THRESHOLD</label>
      </div>
    </div>
    <button class="panel-toggle" [class.active]="on()"
            (click)="onToggle()">GATE</button>
  </div>
</div>
