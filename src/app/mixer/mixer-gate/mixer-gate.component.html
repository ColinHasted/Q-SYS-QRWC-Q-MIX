<div class="control-pane control-pane--gate" [class.is-disabled]="disabled()">
  <div class="control-pane__header">GATE</div>
  <div class="control-pane__content">
    <div class="knob-row">
      <app-gauge-knob
        [position]="attackPos()"
        [displayValue]="attackStr()"
        size="small"
        label="ATTACK"
        (positionChange)="onAttackChange($event)"
      />
      <app-gauge-knob
        [position]="holdPos()"
        [displayValue]="holdStr()"
        size="small"
        label="HOLD"
        (positionChange)="onHoldChange($event)"
      />
      <app-gauge-knob
        [position]="releasePos()"
        [displayValue]="releaseStr()"
        size="small"
        label="RELEASE"
        (positionChange)="onReleaseChange($event)"
      />
    </div>
    <div class="knob-row">
      <app-gauge-knob
        [position]="thresholdPos()"
        [displayValue]="thresholdStr()"
        label="THRESHOLD"
        (positionChange)="onThresholdChange($event)"
      />
      <app-gauge-knob
        [position]="depthPos()"
        [displayValue]="depthStr()"
        label="DEPTH"
        (positionChange)="onDepthChange($event)"
      />
    </div>
    <div class="curve-display">
      <canvas #curveCanvas></canvas>
    </div>
  </div>
  <div class="control-pane__footer">
    <button class="panel-toggle" [class.active]="!bypass()"
            (click)="onToggle()">GATE</button>
  </div>
</div>
