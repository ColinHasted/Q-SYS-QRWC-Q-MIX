<div class="master-section">
  <div class="channel master">
    <div class="channel-label master-label">MASTER</div>

    <!-- VU Meters (stereo) — TODO: wire to QrwcMeterComponent -->
    <div class="vu-meter-stereo">
      <div class="vu-meter master-vu stereo-channel">
        @for (seg of getVUSegments(vuLevelL); track $index) {
          <div class="vu-segment"
               [class.active]="seg"
               [class.yellow]="$index >= 8 && $index < 10"
               [class.red]="$index >= 10"></div>
        }
        <div class="clip-led" [class.active]="clipL">L</div>
      </div>
      <div class="vu-meter master-vu stereo-channel">
        @for (seg of getVUSegments(vuLevelR); track $index) {
          <div class="vu-segment"
               [class.active]="seg"
               [class.yellow]="$index >= 8 && $index < 10"
               [class.red]="$index >= 10"></div>
        }
        <div class="clip-led" [class.active]="clipR">R</div>
      </div>
    </div>

    <!-- Buttons -->
    <div class="channel-buttons">
      <button class="ch-btn mute" [class.active]="mute()"
              (click)="onMuteToggle()">MUTE</button>
    </div>

    <!-- Fader — the app-fader component renders its own scales/track/cap. -->
    <app-fader
      [value]="gain()"
      [min]="-100"
      [max]="10"
      (valueChange)="onFaderChange($event)"
    />
  </div>

  <!-- QMIX logo lives inside the master section so the left border runs full
       height and the logo fills the space below the fader. -->
  <div class="master-branding">
    <img src="q-sys-emblem-white.svg" alt="Q" class="master-branding__emblem" />
    <div class="master-branding__mix">MIX</div>
    <div class="master-branding__surface">SURFACE</div>
  </div>
</div>
