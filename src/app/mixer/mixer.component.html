<div class="mixer">
  <!-- Top Section - Channel Strip Processing -->
  <div class="mixer__top">
    <div class="channel-strip">

      <!-- IN + HPF — self-wire to the selected channel's mic preamp & HPF -->
      <div class="input-stack">
        <app-mixer-input [channel]="selectedChannel()" />
        <app-mixer-hpf   [channel]="selectedChannel()" />
      </div>

      <!-- GATE -->
      <app-mixer-gate [channel]="selectedChannel()" />

      <!-- COMPRESSOR -->
      <app-mixer-compressor [channel]="selectedChannel()" />

      <!-- EQUALISER -->
      <app-mixer-equalizer [channel]="selectedChannel()" />

      <!-- OUTPUT / DELAY -->
      <app-mixer-output [channel]="selectedChannel()" />

      <!-- AUX SENDS (per-channel crosspoint sends to aux buses 1-4) -->
      <app-mixer-aux-sends
        [channel]="selectedChannel()"
        [mixer]="mixer"
      />

      <!-- CUE + AUX MASTER -->
      <div class="cue-aux-stack">
        <app-mixer-cue [mixer]="mixer" />
        <app-mixer-aux-master [mixer]="mixer" />
      </div>

    </div>
  </div>

  <!-- Bottom Section - Fader Bank -->
  <div class="mixer__bottom">
    <div class="fader-bank">

      @for (channelId of channelIds; track channelId) {
        <app-mixer-channel
          [channelId]="channelId"
          [mixer]="mixer"
          [selectedChannel]="selectedChannel()"
          (select)="selectChannel(channelId)"
        />
      }

      <!-- Master Fader -->
      <app-mixer-master [mixer]="mixer" />

    </div>
  </div>
</div>
